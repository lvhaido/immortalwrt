name: 编译红米AX6000 ImmortalWrt固件
on:
  workflow_dispatch:  # 仅手动触发，避免自动消耗算力

jobs:
  compile-firmware:
    runs-on: ubuntu-22.04  # 兼容Debian 11编译要求
    permissions:
      contents: read
      actions: write
      contents: write  # 替代无效的artifacts字段，满足固件上传权限

    steps:
      # 步骤1：严格按官方要求配置编译环境（依赖清单与官方一致）
      - name: 配置编译环境
        run: |
          sudo rm -rf /etc/apt/sources.list.d/*
          sudo apt update -y && sudo apt full-upgrade -y
          # 完全沿用ImmortalWrt官方依赖安装清单
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          sudo timedatectl set-timezone Asia/Shanghai
          # 切换为非root用户（官方要求）
          sudo chown -R $USER:$USER $PWD

      # 步骤2：拉取官方适配分支（openwrt-23.05，而非master）
      - name: 拉取ImmortalWrt源码
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: openwrt-23.05  # 适配红米AX6000的稳定分支
          submodules: recursive
          fetch-depth: 1

      # 步骤3：执行官方必选的feeds更新（此前缺失的核心步骤）
      - name: 更新并安装feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 步骤4：添加自定义插件（按需调整，适配openwrt-23.05分支）
      - name: 安装自定义插件
        run: |
          # PassWall（适配23.05）
          git clone --depth=1 -b openwrt-23.05 https://github.com/xiaorouji/openwrt-passwall.git package/passwall
          # OpenClash（通用适配）
          git clone --depth=1 https://github.com/vernesong/OpenClash.git package/openclash

      # 步骤5：配置红米AX6000编译参数（严格匹配MT7986A硬件）
      - name: 配置编译目标
        run: |
          # 加载MT7986官方默认配置
          cp target/linux/mediatek/filogic/config-6.1 .config
          # 指定红米AX6000机型
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_redmi_ax6000=y" >> .config
          # 启用插件
          echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          # 必选硬件驱动（MT7986无线固件+硬件加速）
          echo "CONFIG_PACKAGE_kmod-mt7986-firmware=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mtk-wed=y" >> .config
          # 官方编译优化配置
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          # 生成最终配置（自动补全依赖）
          make defconfig

      # 步骤6：下载编译依赖（官方流程）
      - name: 下载依赖文件
        run: |
          make download -j$(nproc)
          # 清理无效依赖文件
          find dl -size -1024c -exec rm -f {} \;

      # 步骤7：编译固件（失败时单线程输出日志，便于排查）
      - name: 编译固件
        run: |
          make -j$(nproc) || make -j1 V=s

      # 步骤8：上传固件（保留7天，符合官方输出路径）
      - name: 上传固件到Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ax6000-immortalwrt-firmware
          path: |
            bin/targets/mediatek/filogic/*.bin
            bin/targets/mediatek/filogic/*.img
          retention-days: 7
